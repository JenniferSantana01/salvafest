<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalvaFest — Estoque de Fantasias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0a1a;
    --surface: #1a1228;
    --surface2: #231a35;
    --border: #2e2245;
    --accent: #c084fc;
    --accent2: #f472b6;
    --accent3: #38bdf8;
    --gold: #fbbf24;
    --text: #f1e8ff;
    --muted: #8b7aa8;
    --danger: #f87171;
    --success: #34d399;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a0a2e 0%, #0f0a1a 60%);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .logo span { font-size: 1rem; -webkit-text-fill-color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400; margin-left: 8px; }
  .header-actions { display: flex; gap: 10px; }

  /* BUTTONS */
  .btn {
    padding: 9px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(192,132,252,0.4); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: var(--success); color: #0f0a1a; }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

  /* LAYOUT */
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.purple::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat-card.blue::before { background: var(--accent3); }
  .stat-card.gold::before { background: var(--gold); }
  .stat-card.green::before { background: var(--success); }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; }

  /* SEARCH & FILTERS */
  .toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; }
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    cursor: pointer;
    transition: border 0.2s;
  }
  select:focus { border-color: var(--accent); }

  /* VIEW TOGGLE */
  .view-toggle { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
  .view-btn { padding: 6px 12px; border-radius: 7px; border: none; cursor: pointer; background: transparent; color: var(--muted); font-size: 1rem; transition: all 0.2s; }
  .view-btn.active { background: var(--surface2); color: var(--accent); }

  /* GRID VIEW */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .item-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(192,132,252,0.15); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .item-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    color: var(--muted);
  }
  .item-img img { width: 100%; height: 100%; object-fit: cover; }
  .item-body { padding: 14px; }
  .item-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
  .item-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
  .item-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-cat { background: rgba(192,132,252,0.15); color: var(--accent); border: 1px solid rgba(192,132,252,0.3); }
  .tag-size { background: rgba(56,189,248,0.1); color: var(--accent3); border: 1px solid rgba(56,189,248,0.2); }
  .tag-low { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
  .item-row { display: flex; justify-content: space-between; align-items: center; }
  .item-price { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); }
  .item-qty { font-size: 0.85rem; color: var(--muted); }
  .item-qty.low { color: var(--danger); font-weight: 600; }
  .item-actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }

  /* LIST VIEW */
  .items-list { display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .list-item:hover { border-color: var(--accent); }
  .list-thumb {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
    overflow: hidden;
  }
  .list-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-weight: 600; }
  .list-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .list-right { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin-bottom: 20px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="text"], input[type="number"], input[type="url"], textarea, .form-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
    width: 100%;
  }
  input:focus, textarea:focus, .form-select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* PHOTO UPLOAD */
  .photo-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .photo-area:hover { border-color: var(--accent); }
  .photo-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-preview { width: 100%; max-height: 140px; object-fit: cover; border-radius: 8px; }
  .photo-icon { font-size: 2rem; color: var(--muted); margin-bottom: 6px; }
  .photo-text { font-size: 0.82rem; color: var(--muted); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .list-right { gap: 10px; }
    .header-actions .btn span { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">SalvaFest <span>Gestão de Estoque</span></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportCSV()">📊 <span>Exportar CSV</span></button>
    <button class="btn btn-primary" onclick="openModal()">✨ <span>Novo Item</span></button>
  </div>
</header>

<div class="main">
  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card purple">
      <div class="stat-label">Total de Itens</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Peças em Estoque</div>
      <div class="stat-value" id="stat-qty">0</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-label">Valor do Estoque</div>
      <div class="stat-value" id="stat-value">R$0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Peças Vendidas</div>
      <div class="stat-value" id="stat-sold">0</div>
    </div>
    <div class="stat-card" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#34d399,#38bdf8)"></div>
      <div class="stat-label">Total Arrecadado</div>
      <div class="stat-value" id="stat-revenue" style="font-size:1.4rem;color:var(--success)">R$0</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar por nome, personagem, categoria..." oninput="renderItems()">
    </div>
    <select id="filter-cat" onchange="renderItems()">
      <option value="">Todas as categorias</option>
    </select>
    <input type="text" id="filter-size" placeholder="Filtrar tamanho..." oninput="renderItems()" style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border 0.2s;width:160px">
    <select id="filter-stock" onchange="renderItems()">
      <option value="">Todo estoque</option>
      <option value="low">Estoque baixo (≤5)</option>
      <option value="zero">Sem estoque</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')">☰</button>
    </div>
  </div>

  <!-- ITEMS -->
  <div id="items-container"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Novo Item</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Foto</label>
        <div class="photo-area" id="photo-area" onclick="document.getElementById('photo-input').click()">
          <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)" style="display:none">
          <div id="photo-placeholder">
            <div class="photo-icon">📷</div>
            <div class="photo-text">Clique para adicionar foto</div>
          </div>
          <img id="photo-preview" class="photo-preview hidden" alt="Preview">
        </div>
      </div>
      <div class="form-group full">
        <label>Nome do Item *</label>
        <input type="text" id="f-name" placeholder="Ex: Fantasia de Bruxa Luxo">
      </div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="f-cat" class="form-select" onchange="updateSubcatOptions()">
          <option value="">Selecionar...</option>
          <option>Fantasia</option>
          <option>Máscara</option>
          <option>Chapéu</option>
          <option>Kit Festa</option>
          <option>Acessório</option>
          <option>Maquiagem/Caracterização</option>
          <option>Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subcategoria / Personagem</label>
        <input type="text" id="f-subcat" placeholder="Ex: Harry Potter, Halloween...">
      </div>
      <div class="form-group">
        <label>Tamanho</label>
        <input type="text" id="f-size" placeholder="Ex: M, G, 38, 40, Único...">
      </div>
      <div class="form-group">
        <label>Quantidade *</label>
        <input type="number" id="f-qty" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Preço (R$)</label>
        <input type="number" id="f-price" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Código / SKU</label>
        <input type="text" id="f-sku" placeholder="Ex: FAN-001">
      </div>
      <div class="form-group">
        <label>Cor</label>
        <input type="text" id="f-color" placeholder="Ex: Preto, Vermelho...">
      </div>
      <div class="form-group">
        <label>Condição</label>
        <select id="f-cond" class="form-select">
          <option>Novo</option>
          <option>Bom</option>
          <option>Regular</option>
          <option>Precisa de reparo</option>
        </select>
      </div>
      <div class="form-group">
        <label>Alerta estoque baixo (qtd)</label>
        <input type="number" id="f-alert" placeholder="5" min="0">
      </div>
      <div class="form-group full">
        <label>Observações</label>
        <textarea id="f-obs" placeholder="Detalhes adicionais, medidas específicas, notas..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveItem()">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL VENDA -->
<div class="modal-overlay hidden" id="sell-modal-overlay" onclick="closeSellModalOutside(event)">
  <div class="modal" style="max-width:420px">
    <div class="modal-title">🛍 Registrar Venda</div>
    <div id="sell-item-info" style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:18px;border:1px solid var(--border)">
      <div id="sell-item-name" style="font-weight:600;font-size:1rem"></div>
      <div id="sell-item-meta" style="font-size:0.82rem;color:var(--muted);margin-top:4px"></div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="font-size:0.8rem;color:var(--muted)">Em estoque</div>
        <div id="sell-item-stock" style="font-weight:600;color:var(--accent)"></div>
      </div>
    </div>
    <div class="form-grid" style="grid-template-columns:1fr">
      <div class="form-group">
        <label>Quantidade vendida *</label>
        <input type="number" id="sell-qty" min="1" placeholder="1" oninput="updateSellTotal()">
      </div>
      <div class="form-group">
        <label>Preço de venda por unidade (R$)</label>
        <input type="number" id="sell-price" step="0.01" min="0" placeholder="0,00" oninput="updateSellTotal()">
      </div>
      <div id="sell-total-box" class="hidden" style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Total da venda</div>
        <div id="sell-total-value" style="font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--success);margin-top:4px"></div>
      </div>
      <div class="form-group">
        <label>Observação (opcional)</label>
        <input type="text" id="sell-obs" placeholder="Ex: nome do cliente, forma de pagamento...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeSellModal()">Cancelar</button>
      <button class="btn btn-success" onclick="confirmSell()">✅ Confirmar Venda</button>
    </div>
  </div>
</div>


<script>
let items = JSON.parse(localStorage.getItem('salvafest-items') || '[]');
let sales = JSON.parse(localStorage.getItem('salvafest-sales') || '[]');
let editingId = null;
let sellingId = null;
let currentView = 'grid';
let currentPhoto = null;

function save() {
  localStorage.setItem('salvafest-items', JSON.stringify(items));
  localStorage.setItem('salvafest-sales', JSON.stringify(sales));
  updateStats();
  renderItems();
}

function updateStats() {
  const total = items.length;
  const qty = items.reduce((s, i) => s + (parseInt(i.qty) || 0), 0);
  const value = items.reduce((s, i) => s + ((parseFloat(i.price) || 0) * (parseInt(i.qty) || 0)), 0);
  const totalSold = items.reduce((s, i) => s + (parseInt(i.totalSold) || 0), 0);
  const totalRevenue = sales.reduce((s, sale) => s + (sale.total || 0), 0);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-qty').textContent = qty;
  document.getElementById('stat-value').textContent = 'R$' + value.toLocaleString('pt-BR', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  document.getElementById('stat-sold').textContent = totalSold;
  document.getElementById('stat-revenue').textContent = 'R$' + totalRevenue.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  // update category filter
  const cats2 = [...new Set(items.map(i => i.cat).filter(Boolean))].sort();
  const fc = document.getElementById('filter-cat');
  const cur = fc.value;
  fc.innerHTML = '<option value="">Todas as categorias</option>' + cats2.map(c => `<option${c===cur?' selected':''}>${c}</option>`).join('');
}

function renderItems() {
  const q = document.getElementById('search').value.toLowerCase();
  const fcat = document.getElementById('filter-cat').value;
  const fsize = document.getElementById('filter-size').value;
  const fstock = document.getElementById('filter-stock').value;

  let filtered = items.filter(i => {
    const matchQ = !q || [i.name, i.subcat, i.cat, i.sku, i.color, i.obs].some(f => (f||'').toLowerCase().includes(q));
    const matchCat = !fcat || i.cat === fcat;
    const matchSize = !fsize || (i.size||'').toLowerCase().includes(fsize.toLowerCase());
    const qty = parseInt(i.qty) || 0;
    const alert = parseInt(i.alert) || 5;
    const matchStock = !fstock || (fstock === 'low' && qty <= alert && qty > 0) || (fstock === 'zero' && qty === 0);
    return matchQ && matchCat && matchSize && matchStock;
  });

  const container = document.getElementById('items-container');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎭</div>
      <h3>${items.length === 0 ? 'Estoque vazio' : 'Nenhum item encontrado'}</h3>
      <p>${items.length === 0 ? 'Clique em "Novo Item" para começar!' : 'Tente ajustar os filtros de busca.'}</p>
    </div>`;
    return;
  }

  if (currentView === 'grid') {
    container.className = 'items-grid';
    container.innerHTML = filtered.map(item => renderCard(item)).join('');
  } else {
    container.className = 'items-list';
    container.innerHTML = filtered.map(item => renderListItem(item)).join('');
  }
}

function renderCard(item) {
  const qty = parseInt(item.qty) || 0;
  const alert = parseInt(item.alert) || 5;
  const isLow = qty <= alert && qty > 0;
  const isZero = qty === 0;
  const imgHtml = item.photo
    ? `<div class="item-img"><img src="${item.photo}" alt="${item.name}"></div>`
    : `<div class="item-img">🎭</div>`;

  return `<div class="item-card">
    ${imgHtml}
    <div class="item-body">
      <div class="item-name">${item.name}</div>
      <div class="item-sub">${[item.subcat, item.sku].filter(Boolean).join(' · ') || '—'}</div>
      <div class="item-tags">
        ${item.cat ? `<span class="tag tag-cat">${item.cat}</span>` : ''}
        ${item.size ? `<span class="tag tag-size">${item.size}</span>` : ''}
        ${isLow ? `<span class="tag tag-low">⚠ Baixo</span>` : ''}
        ${isZero ? `<span class="tag tag-low">✗ Zerado</span>` : ''}
        ${item.cond && item.cond !== 'Novo' ? `<span class="tag" style="background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.2)">${item.cond}</span>` : ''}
      </div>
      <div class="item-row">
        <div class="item-price">${item.price ? 'R$ ' + parseFloat(item.price).toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '—'}</div>
        <div class="item-qty ${isLow || isZero ? 'low' : ''}">Estoque: ${qty} ${item.totalSold ? '· Vendidos: '+item.totalSold : ''}</div>
      </div>
      ${item.obs ? `<div style="font-size:0.78rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${item.obs.substring(0,80)}${item.obs.length>80?'...':''}</div>` : ''}
      <div class="item-actions">
        <button class="btn btn-success btn-sm" style="flex:1" onclick="openSellModal('${item.id}')">🛍 Vender</button>
        <button class="btn btn-outline btn-sm" onclick="editItem('${item.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItem('${item.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

function renderListItem(item) {
  const qty = parseInt(item.qty) || 0;
  const alert = parseInt(item.alert) || 5;
  const isLow = qty <= alert;
  const thumbHtml = item.photo
    ? `<div class="list-thumb"><img src="${item.photo}" alt="${item.name}"></div>`
    : `<div class="list-thumb">🎭</div>`;

  return `<div class="list-item">
    ${thumbHtml}
    <div class="list-info">
      <div class="list-name">${item.name}</div>
      <div class="list-meta">${[item.cat, item.subcat, item.size, item.color].filter(Boolean).join(' · ')}</div>
    </div>
    <div class="list-right">
      <div style="text-align:right">
        <div style="font-family:'Playfair Display',serif;color:var(--gold)">${item.price ? 'R$ '+parseFloat(item.price).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—'}</div>
        <div style="font-size:0.8rem;color:${isLow?'var(--danger)':'var(--muted)'}">Qtd: ${qty}</div>
      </div>
      <button class="btn btn-success btn-sm" onclick="openSellModal('${item.id}')">🛍</button>
      <button class="btn btn-outline btn-sm" onclick="editItem('${item.id}')">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="deleteItem('${item.id}')">🗑</button>
    </div>
  </div>`;
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  renderItems();
}

function openModal(id = null) {
  editingId = id;
  currentPhoto = null;
  document.getElementById('photo-preview').classList.add('hidden');
  document.getElementById('photo-placeholder').classList.remove('hidden');

  const fields = ['name','cat','subcat','size','qty','price','sku','color','cond','alert','obs'];
  fields.forEach(f => {
    const el = document.getElementById('f-' + f);
    if (el) el.value = '';
  });
  document.getElementById('f-cond').value = 'Novo';

  if (id) {
    const item = items.find(i => i.id === id);
    if (item) {
      document.getElementById('modal-title').textContent = 'Editar Item';
      fields.forEach(f => {
        const el = document.getElementById('f-' + f);
        if (el && item[f]) el.value = item[f];
      });
      if (item.photo) {
        currentPhoto = item.photo;
        document.getElementById('photo-preview').src = item.photo;
        document.getElementById('photo-preview').classList.remove('hidden');
        document.getElementById('photo-placeholder').classList.add('hidden');
      }
    }
  } else {
    document.getElementById('modal-title').textContent = 'Novo Item';
  }

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentPhoto = e.target.result;
    document.getElementById('photo-preview').src = currentPhoto;
    document.getElementById('photo-preview').classList.remove('hidden');
    document.getElementById('photo-placeholder').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Nome é obrigatório!'); return; }

  const item = {
    id: editingId || Date.now().toString(),
    name,
    cat: document.getElementById('f-cat').value,
    subcat: document.getElementById('f-subcat').value.trim(),
    size: document.getElementById('f-size').value,
    qty: document.getElementById('f-qty').value,
    price: document.getElementById('f-price').value,
    sku: document.getElementById('f-sku').value.trim(),
    color: document.getElementById('f-color').value.trim(),
    cond: document.getElementById('f-cond').value,
    alert: document.getElementById('f-alert').value || '5',
    obs: document.getElementById('f-obs').value.trim(),
    photo: currentPhoto,
  };

  if (editingId) {
    const idx = items.findIndex(i => i.id === editingId);
    if (idx !== -1) items[idx] = item;
  } else {
    items.unshift(item);
  }

  save();
  closeModal();
}

function editItem(id) { openModal(id); }

function deleteItem(id) {
  if (!confirm('Remover este item do estoque?')) return;
  items = items.filter(i => i.id !== id);
  save();
}

function exportCSV() {
  if (items.length === 0) { alert('Estoque vazio, nada para exportar!'); return; }

  // Aba 1: Estoque
  const headers = ['Nome','Categoria','Subcategoria/Personagem','Tamanho','Qtd em Estoque','Qtd Vendida','Preço Cadastrado (R$)','Valor em Estoque (R$)','Total Arrecadado por Item (R$)','Código/SKU','Cor','Condição','Observações'];
  const rows = items.map(i => {
    const qty = parseInt(i.qty) || 0;
    const sold = parseInt(i.totalSold) || 0;
    const price = parseFloat(i.price) || 0;
    const valorEstoque = (qty * price).toFixed(2).replace('.',',');
    // Buscar total arrecadado por item no histórico de vendas
    const arrecadado = sales.filter(s => s.itemId === i.id).reduce((sum, s) => sum + (s.total || 0), 0);
    return [
      i.name, i.cat, i.subcat, i.size,
      qty, sold,
      price.toFixed(2).replace('.',','),
      valorEstoque,
      arrecadado.toFixed(2).replace('.',','),
      i.sku, i.color, i.cond, i.obs
    ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',');
  });

  // Linha de totais
  const totalQty = items.reduce((s,i) => s + (parseInt(i.qty)||0), 0);
  const totalSoldAll = items.reduce((s,i) => s + (parseInt(i.totalSold)||0), 0);
  const totalEstoque = items.reduce((s,i) => s + ((parseFloat(i.price)||0)*(parseInt(i.qty)||0)), 0);
  const totalRevenue = sales.reduce((s,sale) => s + (sale.total||0), 0);
  const totalsRow = [
    'TOTAL','','','',
    totalQty, totalSoldAll, '',
    totalEstoque.toFixed(2).replace('.',','),
    totalRevenue.toFixed(2).replace('.',','),
    '','','',''
  ].map(v => `"${v}"`).join(',');

  // Aba separada: Histórico de vendas
  const salesHeaders = ['Data','Item','Categoria','Qtd Vendida','Preço Unitário (R$)','Total (R$)','Observação'];
  const salesRows = sales.map(s => {
    const d = new Date(s.date);
    const data = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    return [
      data, s.itemName, s.cat||'', s.qty,
      (s.price||0).toFixed(2).replace('.',','),
      (s.total||0).toFixed(2).replace('.',','),
      s.obs||''
    ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',');
  });

  const totalSalesRevenue = sales.reduce((s,sale) => s + (sale.total||0), 0);
  const salesTotalsRow = [`"TOTAL"`,`""`,`""`,`"${sales.reduce((s,sale)=>s+(sale.qty||0),0)}"`,`""`,`"${totalSalesRevenue.toFixed(2).replace('.',',')}"`,`""`].join(',');

  // Montar CSV com duas seções
  let csv = '\uFEFF';
  csv += 'ESTOQUE ATUAL\n';
  csv += [headers.join(','), ...rows, totalsRow].join('\n');
  csv += '\n\n';
  csv += 'HISTÓRICO DE VENDAS\n';
  if (salesRows.length > 0) {
    csv += [salesHeaders.join(','), ...salesRows, salesTotalsRow].join('\n');
  } else {
    csv += 'Nenhuma venda registrada ainda.\n';
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `salvafest-estoque-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function openSellModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  sellingId = id;
  const qty = parseInt(item.qty) || 0;
  document.getElementById('sell-item-name').textContent = item.name;
  document.getElementById('sell-item-meta').textContent = [item.cat, item.subcat, item.size].filter(Boolean).join(' · ');
  document.getElementById('sell-item-stock').textContent = qty + ' unidade(s)';
  document.getElementById('sell-qty').value = '';
  document.getElementById('sell-price').value = item.price || '';
  document.getElementById('sell-obs').value = '';
  document.getElementById('sell-total-box').classList.add('hidden');
  document.getElementById('sell-modal-overlay').classList.remove('hidden');
  updateSellTotal();
}

function closeSellModal() {
  document.getElementById('sell-modal-overlay').classList.add('hidden');
  sellingId = null;
}

function closeSellModalOutside(e) {
  if (e.target === document.getElementById('sell-modal-overlay')) closeSellModal();
}

function updateSellTotal() {
  const qty = parseInt(document.getElementById('sell-qty').value) || 0;
  const price = parseFloat(document.getElementById('sell-price').value) || 0;
  const total = qty * price;
  const box = document.getElementById('sell-total-box');
  if (qty > 0 && price > 0) {
    box.classList.remove('hidden');
    document.getElementById('sell-total-value').textContent = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
  } else {
    box.classList.add('hidden');
  }
}

function confirmSell() {
  const item = items.find(i => i.id === sellingId);
  if (!item) return;
  const qty = parseInt(document.getElementById('sell-qty').value);
  const price = parseFloat(document.getElementById('sell-price').value) || 0;
  const obs = document.getElementById('sell-obs').value.trim();
  const stock = parseInt(item.qty) || 0;

  if (!qty || qty <= 0) { alert('Informe a quantidade vendida!'); return; }
  if (qty > stock) { alert(`Estoque insuficiente! Disponível: ${stock} unidade(s).`); return; }

  // Descontar do estoque
  const idx = items.findIndex(i => i.id === sellingId);
  items[idx].qty = (stock - qty).toString();
  items[idx].totalSold = ((parseInt(items[idx].totalSold) || 0) + qty).toString();

  // Registrar venda
  sales.push({
    id: Date.now().toString(),
    itemId: sellingId,
    itemName: item.name,
    cat: item.cat,
    qty,
    price,
    total: qty * price,
    obs,
    date: new Date().toISOString()
  });

  save();
  closeSellModal();

  // Feedback visual
  const msg = document.createElement('div');
  msg.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#34d399;color:#0f0a1a;padding:14px 20px;border-radius:12px;font-weight:600;z-index:9999;animation:fadeIn 0.3s ease;box-shadow:0 4px 20px rgba(52,211,153,0.4)';
  msg.textContent = `✅ Venda registrada! ${qty}x ${item.name}`;
  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 3000);
}

// INIT
updateStats();
renderItems();
</script>
